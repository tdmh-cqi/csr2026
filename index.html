<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDMH CSR Requisition Form</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

        :root {
            --primary-navy: #002147;
            --accent-blue: #0066cc;
            --urgent-red: #dc3545;
            --bg-light: #f0f4f8;
            --status-pending: #ef6c00;
            --status-approved: #2e7d32;
            --status-disapproved: #c62828;
            --status-released: #1565c0;
            --status-completed: #6a1b9a;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg-light);
            background: linear-gradient(rgba(240, 244, 248, 0.9), rgba(240, 244, 248, 0.9)), 
                        url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&q=80&w=2053');
            background-size: cover;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        /* Tabs Styling */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .tab-btn {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            background: none;
            font-weight: 700;
            color: #888;
            transition: 0.3s;
            border-radius: 8px 8px 0 0;
        }
        .tab-btn.active {
            color: var(--primary-navy);
            background: #fff;
            border-bottom: 3px solid var(--primary-navy);
            margin-bottom: -2px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Header Area */
        .header { text-align: center; margin-bottom: 40px; }
        .cqi-title { font-size: 24px; color: var(--accent-blue); font-weight: 700; font-family: serif; }
        h1 { font-size: 28px; color: var(--primary-navy); margin: 10px 0; letter-spacing: 1px; }
        .subtitle { font-weight: 500; color: #666; text-transform: uppercase; letter-spacing: 2px; }

        /* Form Components */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; color: var(--primary-navy); }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        /* Table Styling */
        .table-responsive { overflow-x: auto; margin: 25px 0; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--primary-navy); color: white; padding: 12px; font-size: 13px; }
        td { border: 1px solid #eee; padding: 10px; font-size: 13px; }

        /* Status Colors */
        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
        }
        .status-pending { background: #fff3e0; color: var(--status-pending); border: 1px solid var(--status-pending); }
        .status-approved { background: #e8f5e9; color: var(--status-approved); border: 1px solid var(--status-approved); }
        .status-disapproved { background: #ffebee; color: var(--status-disapproved); border: 1px solid var(--status-disapproved); }
        .status-released { background: #e3f2fd; color: var(--status-released); border: 1px solid var(--status-released); }
        .status-completed { background: #f3e5f5; color: var(--status-completed); border: 1px solid var(--status-completed); }

        /* Filter Section */
        .tracker-filters {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: end;
            border: 1px solid #eee;
        }

        /* Signatures */
        .signature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 30px; }
        .sig-box { text-align: center; }
        .canvas-container { 
            border: 2px dashed #ccc; 
            background: #fafafa; 
            height: 150px; 
            border-radius: 8px; 
            margin-bottom: 10px;
            position: relative;
        }
        canvas { width: 100%; height: 100%; cursor: crosshair; }

        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 40px; }
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-main { background: var(--primary-navy); color: white; }
        .btn-alt { background: #28a745; color: white; }
        .btn-clear { background: #eee; color: #666; padding: 8px 15px; font-size: 11px; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; }

        @media (max-width: 768px) {
            .form-row, .signature-grid, .tracker-filters { grid-template-columns: 1fr; }
            .container { padding: 20px; }
        }

        @media print {
            .tabs, .btn-group, .btn-clear, .tracker-filters { display: none !important; }
            .container { box-shadow: none; border: none; }
        }

        /* Status Badge for Connection */
        .conn-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .status-online { background: #e6fffa; color: #38b2ac; border: 1px solid #38b2ac; }
        .status-offline { background: #fff5f5; color: #e53e3e; border: 1px solid #e53e3e; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('new')">New Request</button>
        <button class="tab-btn" onclick="switchTab('track')">Track Requests</button>
        <div id="connectionStatus" style="margin-left: auto; align-self: center;">
            <span class="conn-badge status-offline">Checking Link...</span>
        </div>
    </div>

    <!-- REQUISITION FORM -->
    <div id="tab-new" class="tab-content active">
        <div class="header">
            <div class="cqi-title">CQI: Continuous Quality Improvement</div>
            <h1>CENTRAL SUPPLY ROOM</h1>
            <div class="subtitle">Requisition Slip 2026</div>
        </div>

        <form id="mainForm">
            <div class="form-row">
                <div class="form-group">
                    <label>PRIORITY LEVEL</label>
                    <select id="priority" name="priority">
                        <option value="Regular">Regular</option>
                        <option value="Urgent">Urgent 🔥</option>
                    </select>
                </div>
                <div class="form-group" style="text-align: right;">
                    <label>REQUEST NO.</label>
                    <div id="reqNoDisplay" style="font-weight: bold; color: var(--urgent-red); font-size: 18px;">Connecting...</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>DEPARTMENT</label>
                    <input type="text" name="department" id="inputDept" required placeholder="Nursing / ER / Lab...">
                </div>
                <div class="form-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" name="email" required placeholder="staff@hospital.com">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>DATE</label>
                    <input type="date" id="currentDate" name="date" required>
                </div>
                <div class="form-group">
                    <label>TIME</label>
                    <input type="time" id="currentTime" name="time" required>
                </div>
            </div>

            <div class="table-responsive">
                <table id="itemsTable">
                    <thead>
                        <tr>
                            <th width="50px">#</th>
                            <th>Description of Items</th>
                            <th width="100px">Qty</th>
                            <th>Photo (Optional)</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="form-group">
                <label>REMARKS / SPECIAL INSTRUCTIONS</label>
                <textarea name="remarks" id="inputRemarks" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>REQUESTED BY (Full Name)</label>
                <input type="text" name="requester" required>
            </div>

            <div class="signature-grid">
                <div class="sig-box">
                    <label>HOD SIGNATURE</label>
                    <div class="canvas-container">
                        <canvas id="hodPad"></canvas>
                    </div>
                    <button type="button" class="btn-clear" onclick="sigPads.hod.clear()">Clear</button>
                </div>
                <div class="sig-box">
                    <label>ADMIN SIGNATURE</label>
                    <div class="canvas-container">
                        <canvas id="adminPad"></canvas>
                    </div>
                    <button type="button" class="btn-clear" onclick="sigPads.admin.clear()">Clear</button>
                </div>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-main">Submit to CSR</button>
                <button type="button" class="btn btn-alt" onclick="handlePrint()">Submit & Print</button>
            </div>
        </form>
    </div>

    <!-- TRACKER CONTENT -->
    <div id="tab-track" class="tab-content">
        <div class="header">
            <h1>Live Request Tracker</h1>
            <p>Recent submissions from all departments</p>
        </div>

        <div class="tracker-filters">
            <div class="form-group">
                <label>Search Department</label>
                <input type="text" id="trackDeptFilter" placeholder="Type department name..." oninput="filterTrackerData()">
            </div>
            <div class="form-group">
                <label>Filter by Date</label>
                <input type="date" id="trackDateFilter" onchange="filterTrackerData()">
            </div>
            <button class="btn-clear" style="height: 45px;" onclick="clearTrackFilters()">Reset Filters</button>
        </div>

        <div class="table-responsive">
            <table id="trackerTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Dept</th>
                        <th>Items</th>
                        <th>Priority</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="trackerData">
                    <tr><td colspan="6" align="center">Loading data from Google Sheets...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ** IMPORTANT: REPLACE THIS URL WITH YOUR NEW DEPLOYMENT URL **
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzhQwVJTvLo_W4IcxPTdcCDojC92XjS4Y5wb1r_ldwO1jXu7LJ99QBMJ_Ncl4FBek239Q/exec";
    
    let sigPads = { hod: null, admin: null };
    let trackerCache = [];

    window.onload = () => {
        setupItemsTable();
        initPads();
        setDefaults();
        fetchReqNumber();
    };

    function updateStatus(isOnline) {
        const badge = document.querySelector('#connectionStatus span');
        if (isOnline) {
            badge.innerText = "Link Active";
            badge.className = "conn-badge status-online";
        } else {
            badge.innerText = "Connection Failed";
            badge.className = "conn-badge status-offline";
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        if (tab === 'new') {
            document.getElementById('tab-new').classList.add('active');
            document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        } else {
            document.getElementById('tab-track').classList.add('active');
            document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
            fetchTracker();
        }
    }

    function setupItemsTable() {
        const tbody = document.querySelector('#itemsTable tbody');
        for (let i = 1; i <= 10; i++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${i}</td>
                <td><input type="text" class="item-name" placeholder="Item description..."></td>
                <td><input type="number" class="item-qty" placeholder="0" min="0"></td>
                <td><input type="file" class="item-img" accept="image/*"></td>
            `;
            tbody.appendChild(tr);
        }
    }

    function initPads() {
        const hCanvas = document.getElementById('hodPad');
        const aCanvas = document.getElementById('adminPad');
        const resize = (canvas) => {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
        };
        resize(hCanvas); resize(aCanvas);
        sigPads.hod = new SignaturePad(hCanvas);
        sigPads.admin = new SignaturePad(aCanvas);
    }

    function setDefaults() {
        const now = new Date();
        document.getElementById('currentDate').valueAsDate = now;
        document.getElementById('currentTime').value = now.toTimeString().slice(0,5);
    }

    async function fetchReqNumber() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getFormNumber`);
            if (!res.ok) throw new Error();
            const num = await res.text();
            document.getElementById('reqNoDisplay').innerText = num;
            updateStatus(true);
        } catch (e) {
            document.getElementById('reqNoDisplay').innerText = "OFFLINE";
            updateStatus(false);
        }
    }

    // --- CRITICAL ADDITION: COMPRESS IMAGE BEFORE SENDING ---
    // This shrinks the image so it fits inside Google Sheets' 50,000 character cell limit
    const compressImage = (file) => {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Fill with white background to prevent black transparent areas
                    ctx.fillStyle = "#ffffff";
                    
                    // Resize to a max 400px width/height to ensure small Base64 string
                    const MAX_WIDTH = 400;
                    const MAX_HEIGHT = 400;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.fillRect(0, 0, canvas.width, canvas.height); 
                    ctx.drawImage(img, 0, 0, width, height);

                    // Output as JPEG with 0.6 quality compression
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    resolve(compressedBase64);
                };
            };
            reader.onerror = error => reject(error);
        });
    };

    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        await processSubmission(false);
    };

    async function handlePrint() {
        if(document.getElementById('mainForm').checkValidity()) {
            await processSubmission(true);
        } else {
            document.getElementById('mainForm').reportValidity();
        }
    }

    async function processSubmission(isPrint) {
        Swal.fire({ title: 'Compressing Data & Submitting...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const items = [];
        const qtys = [];
        const photos = [];

        const rows = document.querySelectorAll('#itemsTable tbody tr');
        for (let row of rows) {
            const name = row.querySelector('.item-name').value;
            const qty = row.querySelector('.item-qty').value;
            const imgFile = row.querySelector('.item-img').files[0];
            
            if(name) { 
                items.push(name); 
                qtys.push(qty || "0"); 
                if (imgFile) {
                    try {
                        // Use the new compression function here!
                        const b64 = await compressImage(imgFile);
                        photos.push(b64);
                    } catch(e) { photos.push(""); }
                } else {
                    photos.push("");
                }
            }
        }

        if (items.length === 0) {
            Swal.fire('Empty Request', 'Add at least one item.', 'warning');
            return;
        }

        const payload = {
            formNum: document.getElementById('reqNoDisplay').innerText,
            priority: document.getElementById('priority').value,
            dept: document.getElementById('inputDept').value,
            email: document.getElementsByName('email')[0].value,
            date: document.getElementById('currentDate').value,
            time: document.getElementById('currentTime').value,
            reqBy: document.getElementsByName('requester')[0].value,
            recBy: "",
            itemDescs: items.join(" | "),
            itemQtys: qtys.join(" | "),
            photo: photos.find(p => p !== "") || "", 
            additionalNotes: document.getElementById('inputRemarks').value,
            sigHod: sigPads.hod.isEmpty() ? "" : sigPads.hod.toDataURL(),
            sigAdmin: sigPads.admin.isEmpty() ? "" : sigPads.admin.toDataURL()
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            Swal.fire('Success', 'Request sent to CSR successfully!', 'success');
            if(isPrint) window.print();
            setTimeout(() => location.reload(), 2500);
        } catch (e) {
            Swal.fire('Error', 'Could not save data.', 'error');
        }
    }

    async function fetchTracker() {
        const container = document.getElementById('trackerData');
        container.innerHTML = '<tr><td colspan="6" align="center">Refreshing...</td></tr>';
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getRequests`);
            const data = await res.json();
            trackerCache = data;
            renderTrackerTable(trackerCache);
        } catch (e) {
            container.innerHTML = '<tr><td colspan="6" style="color:red">Failed to load tracker.</td></tr>';
        }
    }

    function renderTrackerTable(data) {
        const container = document.getElementById('trackerData');
        if (data.length === 0) {
            container.innerHTML = '<tr><td colspan="6" align="center">No records found.</td></tr>';
            return;
        }

        container.innerHTML = data.sort((a,b) => b.id - a.id).map(row => {
            const status = row.status || 'Pending';
            const sClass = status.toLowerCase().replace(/\s/g, '');
            return `
                <tr>
                    <td>#${row.id}</td>
                    <td>${row.date}</td>
                    <td><b>${row.dept}</b></td>
                    <td style="font-size:11px">${row.items}</td>
                    <td>${row.priority}</td>
                    <td><span class="status-pill status-${sClass}">${status}</span></td>
                </tr>
            `;
        }).join('');
    }

    function filterTrackerData() {
        const deptFilter = document.getElementById('trackDeptFilter').value.toLowerCase();
        const dateFilter = document.getElementById('trackDateFilter').value;
        const filtered = trackerCache.filter(item => {
            const matchDept = !deptFilter || item.dept.toLowerCase().includes(deptFilter);
            const matchDate = !dateFilter || item.date === dateFilter;
            return matchDept && matchDate;
        });
        renderTrackerTable(filtered);
    }

    function clearTrackFilters() {
        document.getElementById('trackDeptFilter').value = '';
        document.getElementById('trackDateFilter').value = '';
        renderTrackerTable(trackerCache);
    }
</script>
</body>
</html>
